apiVersion: v1
kind: Service
metadata:
  name: telemedicine-service-network
spec:
  type: NodePort # Exposes the service so it can be accessed from the local machine
  selector:
    app: telemedicine-service
  ports:
    - protocol: TCP
      port: 5008
      targetPort: 5008
      nodePort: 30008 # Hit http://localhost:30008 in Postman to reach K8s
