apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemedicine-service-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemedicine-service
  template:
    metadata:
      labels:
        app: telemedicine-service
    spec:
      containers:
      - name: telemedicine-service
        image: medigo-telemedicine-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5008
        env:
        - name: PORT
          value: "5008"
        - name: MONGO_URI
          value: "mongodb+srv://medigoAdmin:mediGo%40SE127@medigo-cluster.ega902t.mongodb.net/telemedicine_db?retryWrites=true&w=majority"
        - name: JWT_SECRET
          value: "medigo_super_secret_key"
        - name: SERVICE_SECRET
          value: "medigo_super_secret_key"
